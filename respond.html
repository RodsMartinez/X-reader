<!DOCTYPE html>
<html lang="en" data-barba="wrapper">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Respond</title>
  <link rel="stylesheet" href="respond.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="storyselect.css" />

  <script src="https://unpkg.com/@barba/core"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body data-barba="container" data-barba-namespace="respond">
<audio id="bgm" src="backgrounds/storyselect/respond.mp3" loop autoplay></audio>

  <!-- Words Collected Popup -->
  <div id="collected-words-popup" onclick="openCollectedWords()">Words Collected (click)</div>

  <!-- Modal -->
  <div id="modal-overlay" style="display: none;">
    <div id="modal-content">
      <h2>Collect 15 Words</h2>
      <div id="collected-words-list"></div>
      <button onclick="closeCollectedWords()">Close</button>
    </div>
  </div>

  <!-- Character -->
  <div class="respond-scene">
    <img id="character-image" src="character2full.png" alt="Character" />
    <div class="dialogue-box">"Oh, have you figured it out?"</div>
    <div class="respond-buttons">
        <img src="backgrounds/storyselect/BACKBUTTON.png" class="go-back-image image-button go-back" />
        <input class="answer-input" type="text" placeholder="Type your answer here..." />
        <img src="backgrounds/storyselect/GIVEBUTTON.png" class="submit-image image-button" />
    </div>
  </div>

  <!-- Scripts -->
  <script src="auth.js"></script>
  <script src="script.js"></script>
  <script src="respond-animation.js"></script>
  <script src="respond.js"></script>
  <script src="barba-transition.js"></script>
  <script>
    console.log("Response: In the garden of time, your name blooms with every passing season");
  </script>
</body>
</html>

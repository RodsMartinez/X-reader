<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Reader</title>
    <link rel="stylesheet" href="index.css">
    <script src="auth.js"></script>
</head>
<style>
  body{
    margin: 0;
    height: 100vh;
    background-image: url('bg.gif'); 
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
    background-blend-mode: screen;
    overflow: hidden; 
  } 
  .gallery-button {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: bold;
    border: 1px solid white;
    padding: 6px 12px;
    border-radius: 8px;
    transition:  0.3s ease;
  }

  .gallery-button:hover {
    background: rgba(255, 255, 255, 0.1);
  }
  .gallery-popup {
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: #fff;
    padding: 20px 30px;
    border-radius: 12px;
    box-shadow: 0 0 20px #f9f871;
    font-size: 1.2rem;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
    pointer-events: none;
  }

  .gallery-popup.show {
    opacity: 1;
    pointer-events: auto;
  }

  .hidden {
    display: none;
  }
</style>
    <body data-barba="wrapper">

        <!-- Fixed Header -->
        <header class="navbar">
          <div class="nav-left">
            <img src="logo.png" alt="Logo" class="nav-logo">
            <a href="index.html" class="active">HOME</a>
            <a href="index2.html">CHARACTERS</a>
            <a href="index3.html">PLOT</a>
          </div>
          <div class="nav-right">
            <a href="#" class="login-button"></a>
          </div>
        </header>
      
        <!-- Barba container for page transition -->
        <div data-barba="container" data-barba-namespace="home">
          <div class="content">
            <div class="story-quote">
              “FIND THE ANSWER”
            </div>
            <button class="story-btn" onclick="startStory()">START</button>
          </div>
        </div>
        <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
        <script src="https://unpkg.com/@barba/core"></script>
        <script>
          barba.init({
            transitions: [{
              name: 'flip',
              leave(data) {
                return gsap.to(data.current.container, {
                  rotateX: 90,
                  opacity: 0,
                  duration: 0.2
                });
              },
              enter(data) {
                return gsap.from(data.next.container, {
                  rotateX: -90,
                  opacity: 0,
                  duration: 0.2
                });
              }
            }]
          });
        </script>
         <!-- Popup (Login / Register) -->
  <div id="popup" class="popup hidden">
      <div class="popup-content">
        <span class="close-btn" onclick="closePopup()">×</span>

        <!-- Login Form -->
        <div id="login-form">
          <h2>Who are you?</h2>
          <input type="text" id="login-username" placeholder="Username"><br>
          <input type="password" id="login-password" placeholder="Password">
          <span class="toggle-password" onclick="togglePassword('login-password', this)">Reveal</span><br>
          <button onclick="login()">Login</button>
          <p style="text-align: center; margin-top: 10px;">
          <a href="#" onclick="forgotPassword()">Forgot Password?</a>
          </p>
          <p>Don't have an account? <button onclick="showRegisterForm()">Register</button></p>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="hidden">
          <h2>Applying for X-Reader</h2>
          <input type="text" id="register-username" placeholder="Username"><br>
          <input type="password" id="register-password" placeholder="Password">
          <span class="toggle-password" onclick="togglePassword('register-password', this)">Reveal</span><br>
          <input type="number" id="register-age" placeholder="Age"><br>
          <button onclick="register()">Register</button>
          <p>Already part of the experimentation? <button onclick="showLoginForm()">Login</button></p>
        </div>
      </div>
    </div>
  </div>
  <!-- For testing only -->
<button onclick="localStorage.setItem('unlockedGallery', 'true'); localStorage.removeItem('seenGalleryPopup'); location.reload();">Unlock Gallery</button>

<div id="gallery-popup" class="gallery-popup hidden">
  🎉 Gallery Unlocked! You may now view behind-the-scenes content.
</div>
 <script>
  // Check if true ending was reached
  window.addEventListener('DOMContentLoaded', () => {
    const isGalleryUnlocked = localStorage.getItem("unlockedGallery") === "true";
    const hasSeenPopup = localStorage.getItem("seenGalleryPopup") === "true";

    if (isGalleryUnlocked) {
      const galleryButton = document.createElement("a");
      galleryButton.href = "gallery.html";
      galleryButton.textContent = "GALLERY";
      galleryButton.className = "gallery-button";
      document.querySelector('.nav-left').appendChild(galleryButton);

      // Show popup only the first time
      if (!hasSeenPopup) {
        const popup = document.getElementById('gallery-popup');
        popup.classList.remove('hidden');
        popup.classList.add('show');

        setTimeout(() => {
          popup.classList.remove('show');
          popup.classList.add('hidden');
        }, 4000); // Hide after 4 seconds

        localStorage.setItem("seenGalleryPopup", "true");
      }
    }
  });
</script>
</body>
</html>
